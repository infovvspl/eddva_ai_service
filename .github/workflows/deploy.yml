name: Deploy AI Service to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy FastAPI AI Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /home/ubuntu/eddva_ai_service

            echo "Pulling latest code..."
            git pull origin main

            echo "Installing Python dependencies..."
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            echo "Installing dependencies..."
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            echo "Running migrations..."
            python manage.py migrate --noinput

            echo "Restarting AI service..."
            sudo systemctl restart eddva-ai

            echo "AI Service deployed successfully at $(date)"
            sudo systemctl status eddva-ai --no-pager
